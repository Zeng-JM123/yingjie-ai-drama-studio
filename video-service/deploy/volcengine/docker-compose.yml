name: yingjie-video-gateway

services:
  gateway:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8787"
      DATABASE_PATH: /data/yingjie.db
    expose:
      - "8787"
    volumes:
      - gateway_data:/data
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8787/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      GATEWAY_DOMAIN: ${GATEWAY_DOMAIN:?Set GATEWAY_DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL in .env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - private

networks:
  private:

volumes:
  gateway_data:
  caddy_data:
  caddy_config:
